name: Deploy to Cloudflare Containers

on:
  workflow_dispatch:
    inputs:
      target_environment:
        description: "Cloudflare environment to deploy"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read

concurrency:
  group: cloudflare-containers-${{ github.event.inputs.target_environment || 'staging' }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      TARGET_ENVIRONMENT: ${{ github.event.inputs.target_environment || 'staging' }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
      VAULT_TOKEN: ${{ secrets.VAULT_TOKEN }}
      VAULT_NAMESPACE: ${{ secrets.VAULT_NAMESPACE }}

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Vault CLI
        uses: hashicorp/setup-vault@v3
        with:
          version: 1.21.4

      - name: Install Cloudflare dependencies
        working-directory: cloudflare
        run: npm install --no-package-lock

      - name: Sync Vault secrets to Cloudflare
        working-directory: cloudflare
        run: |
          if [ "$TARGET_ENVIRONMENT" = "production" ]; then
            npm run secrets:sync:production
          else
            npm run secrets:sync:staging
          fi

      - name: Deploy Worker and container
        working-directory: cloudflare
        run: |
          if [ "$TARGET_ENVIRONMENT" = "production" ]; then
            npm run deploy:production -- --non-interactive
          else
            npm run deploy:staging -- --non-interactive
          fi
